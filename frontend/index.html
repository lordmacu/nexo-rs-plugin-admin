    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#00a884" />
    <!-- Force light scheme for the admin shell regardless of
         the operator's OS dark-mode preference. The recipient-
         facing email render handles dark mode on its own (the
         marketing template emits its own color-scheme meta);
         this only affects the editor chrome so operators see
         a consistent white surface. -->
    <meta name="color-scheme" content="only light" />
